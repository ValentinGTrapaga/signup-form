<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up here!</title>
    <!-- Photo of the side background by Calum Lewis 
        https://unsplash.com/photos/vA1L1jRTM70 -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="container">
        <aside class="side-background">
            <div class="blank"></div>
            <div id="logo">
                <h1>Mom's Cookbook</h1>
            </div>
            <div class="blank-2"></div>
            <div class="author-div">
                <p>
                    Photo by <span class="img-author">Calum Lewis</span> on
                    <span class="img-author"><a href="https://unsplash.com/photos/vA1L1jRTM70">Unsplash</a></span>
                </p>
            </div>
        </aside>
        <main>
            <div id="container-top">
                <h2>REGISTER</h2>
                <p id="register-text">
                    Hey there! All your favorite dishes are within reach!
                    Sign up here so you don't miss any.
                    You will have access to 100+ recipes, discounts on kitchen appliances and more.
                </p>
            </div>
            <div id="form">
                <form action="" method="GET">
                    <legend>
                        Let's do this!
                    </legend>
                    <div id="inputs">
                        <div class="column">
                            <div class="form-div"><label for="first_name">FIRST NAME(*)</label><input type="text" required
                                    name="first_name" id="first_name"></div>
                            <div class="form-div"><label for="email">EMAIL(*)</label><input type="email" name="email" required
                                    id="email"></div>
                            <div class="form-div"><label for="password">PASSWORD(*)</label><input type="password" name="password"  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                                title="Must contain at least one  number and one uppercase and lowercase letter, and at least 8 or more characters" required
                                    id="password"></div>
                        </div>
                        <div class="column">
                            <div class="form-div"><label for="last_name">LAST NAME(*)</label><input type="text" required
                                    name="last_name" id="last_name"></div>
                            <div class="form-div"><label for="phone-number">PHONE NUMBER(*) (ONLY NUMBERS)</label><input type="tel" required pattern="[0-9]{10}"
                                title="Only 10 digits number"
                                    name="phone" id="phone-number"></div>
                            <div class="form-div"><label></label><p id="required">(*) for Required</p></div>
                        </div>
                    </div>
                    <input type="submit" value="Create Account" id="submit-btn">
                </form>
            </div>
            <div id="container-bottom">
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </main>
    </div>
</body>

</html>
